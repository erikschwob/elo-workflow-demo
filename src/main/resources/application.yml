spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/elodemo}
    username: ${DB_USER:elodemo}
    password: ${DB_PASSWORD:elodemo}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
